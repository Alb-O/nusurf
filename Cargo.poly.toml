[package]
authors = ["Alex Johnson <alex.kattathra.johnson@gmail.com>", "Albert O'Shea"]
repository = "https://github.com/Alb-O/nusurf"
readme = "README.md"
license = "MIT"
name = "nusurf"
description = "A Nushell plugin for easily streaming output from websocket endpoints"
version = "1.0.6"
edition = "2024"
autobins = false

[[bin]]
name = "nu_plugin_nusurf"
path = "src/main.rs"

[[bin]]
name = "nusurf_live_fixture_server"
path = "src/bin/live_fixture_server.rs"

[dependencies]
nu-plugin = true
nu-protocol = true
serde_json = true
tracing = true
tracing-subscriber = { default-features = false, features = ["fmt"] }
tungstenite = { features = ["native-tls"] }

[dev-dependencies]
nu-plugin-test-support = true
nu-test-support = true

[profile.release]
strip = true
opt-level = "z"
lto = true
codegen-units = 1
panic = "abort"
